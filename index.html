<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Griyo Dhahar Kaca5</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ================= RESET ================= */
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ min-height:100vh; overflow-x:hidden; background: linear-gradient(135deg, #fff6e9, #ffe4c7, #ffd2a8); }

/* ================= HEADER ================= */
.header{
  text-align:center;
  padding:28px 20px;
  font-size:30px;
  font-weight:700;
  background: linear-gradient(90deg,#ff7a00,#ffb347);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:.5px;
}

/* ================= SEARCH ================= */
.search-box{
  max-width:500px;
  margin:0 auto 15px;
  background:white;
  border-radius:50px;
  padding:10px 18px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  display:flex;
  align-items:center;
  gap:10px;
}
.search-box input{
  border:none; outline:none; width:100%; font-size:14px; background:transparent;
}

/* ================= FILTER ================= */
.filter-wrap{
  text-align:center;
  margin-bottom:15px;
}
.filter-btn{
  padding:10px 18px; margin:5px; border:none; border-radius:25px; background:#e0e0e0;
  cursor:pointer; font-weight:600; transition:.25s;
}
.filter-btn.active, .filter-btn:hover{ background:#ff7a00; color:white; }

/* ================= SUBFILTER ================= */
.subfilter-wrap{
  text-align:center;
  margin-bottom:15px;
  display:none;
}
.subfilter-btn{
  padding:8px 14px; margin:3px; border:none; border-radius:20px; background:#f0f0f0;
  cursor:pointer; font-size:13px; transition:.25s;
}
.subfilter-btn.active, .subfilter-btn:hover{ background:#ff7a00; color:white; }

/* ================= GRID ================= */
.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
  padding:20px;
}

/* ================= CARD ================= */
.menu-card{
  background: rgba(255,255,255,0.75);
  border-radius:20px;
  overflow:hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.10), 0 2px 8px rgba(255,122,0,0.15);
  display:none;
  flex-direction:column;
  transition: all .35s ease;
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.6);
}
.menu-card.show{ display:flex; }
.menu-card:hover{ transform: translateY(-8px) scale(1.02); box-shadow: 0 18px 45px rgba(0,0,0,0.18),0 0 25px rgba(255,122,0,0.25); }

/* ================= IMAGE ================= */
.menu-img{ width:100%; height:160px; object-fit:cover; cursor:pointer; }

/* ================= CONTENT ================= */
.menu-content{ padding:14px; display:flex; flex-direction:column; flex-grow:1; }
.menu-title{ font-weight:700; margin-bottom:6px; }
.menu-desc{ font-size:13px; color:#666; flex-grow:1; }

/* ================= PRICE ================= */
.menu-footer{ margin-top:auto; }
.price{ font-weight:700; color:#ff7a00; font-size:16px; }

/* ================= ZOOM ================= */
#zoomView{
  position:fixed; inset:0; background:rgba(0,0,0,.85);
  display:none; align-items:center; justify-content:center; z-index:9999; padding:20px;
}
#zoomView img{ max-width:90%; max-height:90%; border-radius:16px; animation:zoomIn .25s ease; }
@keyframes zoomIn{ from{transform:scale(.7);opacity:0;} to{transform:scale(1);opacity:1;} }

/* ================= FLOAT WA ================= */
.btn-wa{
  position:fixed; bottom:20px; right:20px; background:#25D366; color:white; padding:14px 22px; border-radius:50px;
  font-weight:600; text-decoration:none; box-shadow:0 10px 25px rgba(0,0,0,0.25); z-index:999; transition:.3s;
}
.btn-wa.hide{ transform:translateY(120px); }
.btn-wa:hover{ transform:translateY(-3px); }

/* ================= MOBILE ================= */
@media(max-width:500px){ .menu-img{ height:140px; } }
.btn-wa i{ margin-right:8px; font-size:18px; }

</style>
</head>
<body>

<div class="header">Griyo Dhahar Kaca5</div>

<div class="search-box">
  <i class="fas fa-search"></i>
  <input type="text" id="searchInput" placeholder="Cari menu favorit...">
</div>

<!-- KATEGORI UTAMA -->
<div class="filter-wrap">
  <button class="filter-btn active" onclick="filterMenu('all', event)">Semua</button>
  <button class="filter-btn" onclick="filterMenu('makanan', event)">Makanan</button>
  <button class="filter-btn" onclick="filterMenu('sayur', event)">Sayur</button>
  <button class="filter-btn" onclick="filterMenu('extra', event)">Extra</button>
  <button class="filter-btn" onclick="filterMenu('snack', event)">Snack</button>
  <button class="filter-btn" onclick="filterMenu('minuman', event)">Minuman</button>
</div>

<!-- SUBKATEGORI -->
<div class="subfilter-wrap" id="subFilterWrap"></div>

<!-- MENU GRID -->
<div class="menu-grid">

  <!-- MAKANAN -->
  <div class="menu-card makanan paket"><img class="menu-img" src="images/1.png" onclick="zoomImage(this.src)">
    <div class="menu-content"><div class="menu-title">Paket Ayam</div><div class="menu-desc">Ayam goreng crispy</div>
    <div class="menu-footer"><div class="price">Rp18.000</div></div></div></div>

  <div class="menu-card makanan 'rice-noodles'"><img class="menu-img" src="images/2.png" onclick="zoomImage(this.src)">
    <div class="menu-content"><div class="menu-title">Mie Goreng</div><div class="menu-desc">Rice noodles special</div>
    <div class="menu-footer"><div class="price">Rp15.000</div></div></div></div>

  <!-- MINUMAN -->
  <div class="menu-card minuman oriental"><img class="menu-img" src="images/3.png" onclick="zoomImage(this.src)">
    <div class="menu-content"><div class="menu-title">Teh Tarik</div><div class="menu-desc">Oriental drink</div>
    <div class="menu-footer"><div class="price">Rp10.000</div></div></div></div>

  <div class="menu-card minuman juice"><img class="menu-img" src="images/4.png" onclick="zoomImage(this.src)">
    <div class="menu-content"><div class="menu-title">Jus Jeruk</div><div class="menu-desc">Fresh juice</div>
    <div class="menu-footer"><div class="price">Rp12.000</div></div></div></div>

</div>

<!-- ZOOM -->
<div id="zoomView" onclick="closeZoom()"><img id="zoomImg"></div>

<!-- FLOAT WA -->
<a href="https://wa.me/6282116677330?text=Halo kk saya ingin pesan" class="btn-wa" target="_blank">
<i class="fab fa-whatsapp"></i> Pesan Sekarang</a>

<script>
const subKategori = {
  makanan: ['paket','rice-noodles','poultry-meat','gammik','beef-belly','fish-seafood'],
  minuman: ['oriental','juice','origin','float','yakult','squash']
};

const subNames = {
  'paket':'PAKET', 'rice-noodles':'Rice Noodles', 'poultry-meat':'Poultry Meat',
  'gammik':'Gammik','beef-belly':'Beef Belly','fish-seafood':'Fish Seafood',
  'oriental':'Oriental','juice':'Juice','origin':'Origin','float':'Float','yakult':'Yakult','squash':'Squash'
};

function filterMenu(category,e){
  document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.remove('active'));
  e.target.classList.add('active');

  // tampilkan subkategori jika ada
  const wrap = document.getElementById('subFilterWrap');
  wrap.innerHTML = '';
  if(subKategori[category]){
    wrap.style.display='block';
    subKategori[category].forEach(sub=>{
      const btn = document.createElement('button');
      btn.className='subfilter-btn';
      btn.innerText=subNames[sub];
      btn.onclick = ()=>filterSubMenu(sub);
      wrap.appendChild(btn);
    });
  } else wrap.style.display='none';

  document.querySelectorAll('.menu-card').forEach(card=>{
    card.classList.remove('show');
    if(category==='all') card.classList.add('show');
    else if(card.classList.contains(category)) card.classList.add('show');
  });
}

function filterSubMenu(sub){
  document.querySelectorAll('.subfilter-btn').forEach(btn=>btn.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.menu-card').forEach(card=>{
    card.classList.remove('show');
    if(card.classList.contains(sub)) card.classList.add('show');
  });
}

function zoomImage(src){ document.getElementById('zoomView').style.display='flex'; document.getElementById('zoomImg').src=src; }
function closeZoom(){ document.getElementById('zoomView').style.display='none'; }

// live search
document.getElementById('searchInput').addEventListener('input',function(){
  const keyword=this.value.toLowerCase();
  document.querySelectorAll('.menu-card').forEach(card=>{
    const title=card.querySelector('.menu-title').innerText.toLowerCase();
    if(title.includes(keyword)) card.classList.add('show'); else card.classList.remove('show');
  });
});

// auto show all on load
window.addEventListener('DOMContentLoaded',()=>{ filterMenu('all',{target:document.querySelector('.filter-btn.active')}); });
</script>

</body>
</html>
